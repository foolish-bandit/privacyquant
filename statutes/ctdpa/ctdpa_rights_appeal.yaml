id: "ctdpa.rights.appeal"
statute: "CTDPA"
section: "Conn. Gen. Stat. § 42-518(c)"
title: "Right to Appeal Denied Request"
effective_date: "2023-07-01"
supersedes: []
amended_by: []
requirement_type: hard
obligation_bearer: controller
trigger: "Controller declines to take action on a consumer rights request"
requirement: >
  If the controller declines to act, it must inform the consumer within 45 days with reasons
  and instructions for how to appeal. The controller must complete the appeal within 60 days
  of receipt. If the appeal is denied, the controller must provide an online mechanism for
  the consumer to contact the Connecticut AG to submit a complaint.
exceptions: []
contract_signals:
  - "right to appeal"
  - "appeal denied request"
  - "appeal process"
  - "consumer appeal"
cross_refs:
