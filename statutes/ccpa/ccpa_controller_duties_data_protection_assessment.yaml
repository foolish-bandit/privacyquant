id: "ccpa.controller_duties.data_protection_assessment"
statute: "CCPA/CPRA"
section: "Cal. Civ. Code § 1798.185(a)(15); Cal. Code Regs. tit. 11, §§ 7150-7158"
title: "Privacy Risk Assessment — Mandatory for High-Risk Processing (Eff. Jan. 1, 2026)"
effective_date: "2026-01-01"
supersedes: []
amended_by: []
requirement_type: hard
obligation_bearer: business
trigger: >
  Business conducts processing activities that present 'significant risk' to consumer privacy.
  Significant risk is present when the business: (a) sells or shares PI; (b) processes sensitive PI;
  (c) trains or uses ADMT for 'significant decisions'; (d) uses biometrics for identity verification
  or profiling; (e) makes automated inferences in sensitive contexts.
  Higher threshold for cybersecurity audit trigger: must also process PI of 250,000+ consumers or
  sensitive PI of 50,000+ consumers AND have annual gross revenue >$26,625,000.
requirement: >
  Before initiating any high-risk processing, and within 45 days of any material change,
  the business must conduct and document a privacy risk assessment (§§ 7150-7158) that:
  - Identifies purposes, benefits, and reasonably foreseeable privacy risks of the processing
  - Weighs benefits to business/consumers against privacy risks
  - Documents safeguards that restrict or eliminate identified risks
  - Is certified by a senior executive and retained for minimum 5 years or duration of processing
  Submission to CPPA: businesses must submit attestation + risk assessment summary to CPPA.
  For processing that began before Jan. 1, 2026 and continues: assessment must be completed by
  Dec. 31, 2027. Annual summary reporting to CPPA begins April 1, 2028.
  Businesses must review and update assessments at least every 3 years.
  Cybersecurity Audit (§§ 7120-7124): separate annual independent audit required; see
  ccpa.controller_duties.cybersecurity_audit node for deadlines by revenue tier.
exceptions:
  - "Processing already subject to a substantially similar assessment under another applicable law may be used if supplemented with required CCPA-specific information"
  - "Assessment may cover a comparable set of similar processing activities under § 7156"
