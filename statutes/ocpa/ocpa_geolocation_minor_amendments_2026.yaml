id: "ocpa.rights.geolocation_minor_amendments_2026"
statute: "OCPA"
section: "ORS § 646A.574; OR HB 2008 (2025)"
title: "2026 Amendments — Precise Geolocation Sale Ban and Minor Data Sale Prohibition"
effective_date: "2026-01-01"
supersedes: []
amended_by: []
requirement_type: hard
obligation_bearer: controller
trigger: "Controller sells precise geolocation data, OR controller sells personal data of a known consumer under 16"
requirement: >
  OR HB 2008 (2025) amended OCPA effective January 1, 2026, adding two flat prohibitions:
  1. PRECISE GEOLOCATION SALE BAN: Controllers may not sell precise geolocation data
     relating to an individual's location within a 1,750-foot radius. This is a flat
     prohibition — no opt-out mechanism available; sale is simply prohibited.
     Note: OCPA's radius (1,750 feet) is narrower than CCPA's ~1,850 feet threshold.
  2. MINOR DATA SALE BAN: Controllers may not sell personal data when the controller
     has actual knowledge, or willfully disregards knowledge, that the consumer is
     under 16 years of age. This is a flat prohibition, not an opt-in mechanism.
  Additionally effective January 1, 2026: the 30-day right to cure EXPIRED.
  OCPA violations are now immediately actionable without a statutory cure period.
exceptions:
  - "Geolocation ban applies to sale — internal use of precise geolocation data is not banned by this amendment (but may require opt-out under existing OCPA)"
  - "Minor data ban triggered by actual knowledge or willful disregard — unknowing processing not covered"
