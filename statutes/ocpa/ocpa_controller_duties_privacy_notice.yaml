id: "ocpa.controller_duties.privacy_notice"
statute: "OCPA"
section: "ORS § 646A.578(1)"
title: "Privacy Notice Requirements"
effective_date: "2024-07-01"
supersedes: []
amended_by: []
requirement_type: hard
obligation_bearer: controller
trigger: "Controller processes personal data of Oregon consumers"
requirement: >
  Controller must provide a reasonably accessible, clear, and meaningful privacy notice
  including: categories of PD processed; purposes for processing; how consumers may exercise
  their rights and appeal denials; categories of PD sold or used for targeted advertising;
  categories of third parties; an active contact email or online mechanism.
exceptions: []
contract_signals:
  - "privacy notice"
  - "privacy policy"
  - "privacy statement"
  - "data processing disclosure"
cross_refs:
  - "ccpa.controller_duties.privacy_notice"
  - "vcdpa.controller_duties.privacy_notice"
  - "cpa.controller_duties.privacy_notice"
source_url: "https://www.oregonlegislature.gov/bills_laws/ors/ors646A.html"
