id: "modpa.rights.portability"
statute: "MODPA"
section: "Md. Code Com. Law § 14-4605(a)(4)"
title: "Right to Data Portability"
effective_date: "2025-10-01"
supersedes: []
amended_by: []
requirement_type: hard
obligation_bearer: controller
trigger: "Consumer submits an authenticated request to obtain a portable copy of personal data"
requirement: >
  Controller must provide a copy of the consumer's PD in a portable, readily usable format
  that allows the consumer to transmit the data to another controller without hindrance,
  where technically feasible. Response deadline: 45 days.
exceptions:
  - "Disclosure would reveal a trade secret"
  - "Request is manifestly unfounded, excessive, or repetitive"
contract_signals:
  - "data portability"
  - "portable format"
  - "machine-readable copy"
  - "transmit to another controller"
  - "right to data portability"
cross_refs:
  - "ccpa.rights.portability"
  - "vcdpa.rights.portability"
  - "cpa.rights.portability"
source_url: "https://mgaleg.maryland.gov/2024RS/Chapters_noln/CH_182_sb0541e.pdf"
git_hash: "b5cef5e10e8f90efefb04306aad49942e0e69e32"
