# PrivacyQuant Statutory Node Schema
# Every file in statutes/ must conform to this schema.
# git_hash is auto-populated on commit — never hand-edit.

id: string                    # dot-notation: <statute>.<area>.<aspect> e.g. "ccpa.rights.deletion"
statute: string               # statute acronym e.g. "CCPA/CPRA", "VCDPA"
section: string               # primary code section(s) in citation-ready form
title: string                 # short human-readable title
effective_date: string        # ISO 8601 date requirement became effective
supersedes:                   # node IDs this node replaces (empty list if none)
  - string
amended_by:                   # node IDs that amend this node (empty list if none)
  - string
requirement_type: enum        # hard | threshold | soft
                              #   hard      = binary obligation (comply or don't)
                              #   threshold = ranged or conditional (e.g. "within 45 days", "≥100k consumers")
                              #   soft      = flagged-for-human (e.g. "commercially reasonable")
obligation_bearer: enum       # business | service_provider | third_party | processor | controller | all
trigger: string               # plain-language condition activating this requirement
requirement: string           # the obligation in plain language, active voice
exceptions:                   # plain-language exceptions (empty list if none)
  - string
contract_signals:             # keywords/phrases appearing in DPAs/contracts that signal relevance
  - string
data_categories:              # optional: IAB/Fideslang data category keys that trigger this node
  - string                    # dot-notation IAB taxonomy key, e.g. "user.biometric", "user.health_and_medical"
                              # see references/fideslang-mapping.yaml for full cross-reference
cross_refs:                   # IDs of related requirements in other statutes
  - string
source_url: string            # official legislative source URL
git_hash: string              # auto-populated on commit — always "" in hand-edited files
