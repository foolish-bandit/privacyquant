title: PrivacyQuant
description: >
  Versioned statutory knowledge graph and MCP workflow layer for US state
  consumer privacy law. 146 YAML nodes across 20 statutes, 84 enforcement
  actions, and 16 deterministic MCP tools for applicability analysis, DPA
  drafting, DSAR routing, conflict resolution, and risk scoring.
url: "https://foolish-bandit.github.io"
baseurl: "/privacyquant"

author:
  name: foolish-bandit
  url: https://github.com/foolish-bandit

repository: foolish-bandit/privacyquant

theme: minima

plugins:
  - jekyll-sitemap
  - jekyll-feed

# Tell Jekyll to render markdown files in references/ and statutes/
include:
  - references
  - statutes
  - assets
  - docs

# Don't render build/config artifacts as pages
exclude:
  - mcp-server
  - scripts
  - .githooks
  - .claude-plugin
  - node_modules
  - "*.sh"
  - "*.py"
  - CLAUDE.md
  - CONNECTORS.md
  - SUBMISSION.md
  - .mcp.json
  - .gitignore

# Markdown settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections for structured content
collections:
  statutes:
    output: true
    permalink: /statutes/:path/
  references:
    output: true
    permalink: /references/:path/

defaults:
  - scope:
      path: "references"
    values:
      layout: default
  - scope:
      path: "statutes"
    values:
      layout: default

# SEO / crawl metadata
lang: en
timezone: America/Los_Angeles
