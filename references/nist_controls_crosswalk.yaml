# PrivacyQuant NIST Controls Crosswalk
#
# Maps selected statutory nodes to NIST SP 800-53 Rev. 5 / Privacy Framework-related
# control identifiers. These mappings are intended to help security and compliance teams
# connect PrivacyQuant statutory nodes to existing control catalogs.
#
# Important: a control mapping is a crosswalk aid, not a legal conclusion and not proof
# of compliance with the underlying statute. Teams should validate mappings against their
# own systems, policies, processing activities, and counsel review.

